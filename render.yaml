services:
  - type: web
    name: healthai-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn render_start:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9