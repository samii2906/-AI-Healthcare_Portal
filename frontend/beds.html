<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HealthAI — Beds</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .modal-overlay{position:fixed;inset:0;background:rgba(60,40,120,.35);z-index:500;display:flex;align-items:center;justify-content:center}
    .modal-box{background:var(--white);border-radius:20px;padding:2rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(100,80,200,.2)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .modal-title{font-size:1.1rem;font-weight:800;color:var(--text)}
    .close-btn{background:var(--pink);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;font-weight:700}
    .quick-btn{border-radius:14px;border:none;padding:14px 20px;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;gap:10px;margin-bottom:10px;transition:opacity .2s}
    .quick-btn:hover{opacity:.85}
  </style>
</head>
<body>
<nav>
  <div class="nav-brand"><span class="logo">🏥</span> HealthAI</div>
  <div class="nav-links">
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/patients">👥 Patients</a>
    <a href="/predict">🧠 AI Tools</a>
    <a href="/appointments">📅 Appointments</a>
    <a href="/beds" class="active">🛏 Beds</a>
    <a href="/staff">👔 Staff</a>
  </div>
  <div class="nav-right">
    <span id="user-badge" style="background:var(--lavender);padding:6px 14px;border-radius:8px;font-size:.85rem;font-weight:600"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- Admit Patient Modal -->
<div class="modal-overlay" id="admit-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">➕ Admit New Patient to Bed</span>
      <button class="close-btn" onclick="closeModal('admit-modal')">✕</button>
    </div>
    <div id="admit-alert"></div>
    <div class="form-group"><label>Select Patient</label><select id="a-pid"></select></div>
    <div class="form-group"><label>Ward</label>
      <select id="a-ward" onchange="loadAvailBeds()">
        <option>General Ward</option><option>ICU Ward</option>
        <option>Pediatric Ward</option><option>Surgery Ward</option>
      </select>
    </div>
    <div class="form-group"><label>Available Bed</label><select id="a-bed"></select></div>
    <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="admitPatient()">✅ Admit Patient</button>
  </div>
</div>

<!-- Mark Available Modal -->
<div class="modal-overlay" id="avail-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">✅ Mark Bed Available</span>
      <button class="close-btn" onclick="closeModal('avail-modal')">✕</button>
    </div>
    <div id="avail-alert"></div>
    <div class="form-group"><label>Select Occupied Bed</label><select id="av-bed"></select></div>
    <button class="btn btn-success" style="width:100%;margin-top:1rem" onclick="markAvailable()">✅ Mark as Available</button>
  </div>
</div>

<!-- Emergency Reserve Modal -->
<div class="modal-overlay" id="emerg-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">🚨 Emergency Bed Reserve</span>
      <button class="close-btn" onclick="closeModal('emerg-modal')">✕</button>
    </div>
    <div id="emerg-alert"></div>
    <div class="form-group"><label>Ward</label>
      <select id="e-ward">
        <option>ICU Ward</option><option>General Ward</option>
        <option>Surgery Ward</option><option>Pediatric Ward</option>
      </select>
    </div>
    <div class="form-group"><label>Number of Beds to Reserve</label>
      <input type="number" id="e-count" value="1" min="1" max="5">
    </div>
    <div class="form-group"><label>Emergency Type</label>
      <select id="e-type">
        <option>Trauma</option><option>Cardiac</option><option>Respiratory</option>
        <option>Neurological</option><option>General Emergency</option>
      </select>
    </div>
    <button class="btn btn-danger" style="width:100%;margin-top:1rem;background:#FFB3C6" onclick="reserveEmergency()">🚨 Reserve Beds</button>
  </div>
</div>

<div style="padding:2rem;max-width:1300px;margin:0 auto">
  <!-- Ward status -->
  <div style="background:linear-gradient(135deg,#f0e8ff,#e8f0ff);border-radius:var(--radius);padding:1.5rem;margin-bottom:2rem">
    <h1 style="font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:1.2rem">🏥 Ward-by-Ward Status</h1>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem" id="ward-cards"></div>
  </div>

  <!-- Chart + Quick Actions -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1.5rem;margin-bottom:2rem">
    <div class="card">
      <div class="card-title">📈 AI Bed Demand Forecast — Next 7 Days</div>
      <div class="chart-container"><canvas id="forecast-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">⚡ Quick Actions</div>
      <button class="quick-btn" style="background:linear-gradient(135deg,#C9B8FF,#b0a0ff);color:var(--text)" onclick="openAdmit()">➕ Admit New Patient</button>
      <button class="quick-btn" style="background:linear-gradient(135deg,#B5EAD7,#96d9be);color:var(--text)" onclick="openAvail()">✅ Mark Bed Available</button>
      <button class="quick-btn" style="background:linear-gradient(135deg,#FFB3C6,#ff8fab);color:var(--text)" onclick="openEmerg()">🚨 Emergency Reserve</button>
      <button class="quick-btn" style="background:linear-gradient(135deg,#B5D5FF,#93c0f8);color:var(--text)" onclick="window.location='/predict'">🧠 AI Outcome Predict</button>
    </div>
  </div>

  <!-- Bed Map -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="card-title" style="margin:0">🗺️ Live Bed Map</div>
      <div style="display:flex;gap:12px;font-size:.82rem">
        <span><span style="display:inline-block;width:12px;height:12px;background:var(--mint);border-radius:3px"></span> Available</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:var(--pink);border-radius:3px"></span> Occupied</span>
      </div>
    </div>
    <div id="all-wards"></div>
  </div>
</div>

<script>
const API=''; const user=JSON.parse(localStorage.getItem('hai_user')||'{}');
if(!user.username) window.location.href='/';
document.getElementById('user-badge').textContent=`👤 ${user.username} (${user.role})`;
function logout(){ localStorage.removeItem('hai_user'); window.location.href='/'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

let allBeds=[], allPatients=[];

async function loadData(){
  allBeds=await fetch('/api/beds').then(r=>r.json());
  renderWardCards(); renderBedMap(); drawForecast();
}

function renderWardCards(){
  const wards=['General Ward','ICU Ward','Pediatric Ward','Surgery Ward'];
  const colors=['mint','pink','sky','lavender'];
  const emojis=['🏥','🚨','👶','⚕️'];
  document.getElementById('ward-cards').innerHTML=wards.map((w,i)=>{
    const wbeds=allBeds.filter(b=>b.ward===w);
    const occup=wbeds.filter(b=>b.status==='occupied').length;
    const total=wbeds.length;
    const pct=total?Math.round(occup/total*100):0;
    const zone=pct>=70?'critical zone':pct>=40?'moderate':'comfortable';
    const barColor=pct>=70?'#FFB3C6':pct>=40?'#FFF0A0':'#B5EAD7';
    return `<div class="stat-card ${colors[i]}" style="border-radius:var(--radius);padding:1.2rem">
      <div style="font-weight:700;font-size:1rem;margin-bottom:8px">${emojis[i]} ${w}</div>
      <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:6px">
        <span style="color:var(--muted)">${total} Total</span>
        <span style="font-weight:700;color:#d62839">${occup} Occupied</span>
      </div>
      <div class="resource-bar"><div class="resource-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:4px">${pct}% — ${zone}</div>
    </div>`;
  }).join('');
}

function renderBedMap(){
  const wards=['General Ward','ICU Ward','Pediatric Ward','Surgery Ward'];
  document.getElementById('all-wards').innerHTML=wards.map(w=>{
    const wbeds=allBeds.filter(b=>b.ward===w);
    const cells=wbeds.map(b=>`
      <div class="bed-cell ${b.status==='occupied'?'bed-occupied':'bed-available'}"
           onclick="toggleBed(${b.id},'${b.status}')" title="${b.bed_number} — ${b.status}">
        🛏<br><span style="font-size:.65rem">${b.bed_number}</span>
      </div>`).join('');
    return `<div style="margin-bottom:1.5rem">
      <h3 style="font-size:.9rem;font-weight:700;color:var(--muted);margin-bottom:8px">${w} (${wbeds.filter(b=>b.status==='available').length} available)</h3>
      <div class="bed-grid">${cells}</div>
    </div>`;
  }).join('');
}

async function toggleBed(id,cur){
  const next=cur==='available'?'occupied':'available';
  await fetch(`/api/beds/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:next})});
  loadData();
}

function drawForecast(){
  const labels=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d.toLocaleDateString('en',{weekday:'short'});});
  new Chart(document.getElementById('forecast-chart'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Predicted Demand',data:[68,71,74,69,78,65,74],borderColor:'#9b8df0',backgroundColor:'rgba(155,141,240,.15)',tension:.4,pointBackgroundColor:'#9b8df0'},
        {label:'Available Capacity',data:[32,29,26,31,22,35,26],borderColor:'#B5EAD7',borderDash:[6,4],tension:.4,pointBackgroundColor:'#B5EAD7'},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true}},plugins:{legend:{position:'top'}}}
  });
}

// Quick action modals
async function openAdmit(){
  if(!allPatients.length) allPatients=await fetch('/api/patients').then(r=>r.json());
  document.getElementById('a-pid').innerHTML=allPatients.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  await loadAvailBeds();
  document.getElementById('admit-modal').style.display='flex';
}
async function loadAvailBeds(){
  const ward=document.getElementById('a-ward').value;
  const avail=allBeds.filter(b=>b.ward===ward&&b.status==='available');
  document.getElementById('a-bed').innerHTML=avail.length
    ? avail.map(b=>`<option value="${b.id}">${b.bed_number}</option>`).join('')
    : '<option value="">No beds available</option>';
}
async function admitPatient(){
  const bid=document.getElementById('a-bed').value;
  const pid=document.getElementById('a-pid').value;
  if(!bid){ document.getElementById('admit-alert').innerHTML='<div class="alert alert-error">No available beds in this ward.</div>'; return; }
  await fetch(`/api/beds/${bid}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'occupied',patient_id:pid})});
  document.getElementById('admit-alert').innerHTML='<div class="alert alert-success">✅ Patient admitted successfully!</div>';
  setTimeout(()=>{ closeModal('admit-modal'); document.getElementById('admit-alert').innerHTML=''; loadData(); },1500);
}

function openAvail(){
  const occup=allBeds.filter(b=>b.status==='occupied');
  document.getElementById('av-bed').innerHTML=occup.map(b=>`<option value="${b.id}">${b.bed_number} (${b.ward})</option>`).join('');
  document.getElementById('avail-modal').style.display='flex';
}
async function markAvailable(){
  const bid=document.getElementById('av-bed').value;
  await fetch(`/api/beds/${bid}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'available',patient_id:null})});
  document.getElementById('avail-alert').innerHTML='<div class="alert alert-success">✅ Bed marked as available!</div>';
  setTimeout(()=>{ closeModal('avail-modal'); document.getElementById('avail-alert').innerHTML=''; loadData(); },1500);
}

function openEmerg(){ document.getElementById('emerg-modal').style.display='flex'; }
async function reserveEmergency(){
  const ward=document.getElementById('e-ward').value;
  const count=parseInt(document.getElementById('e-count').value);
  const etype=document.getElementById('e-type').value;
  const avail=allBeds.filter(b=>b.ward===ward&&b.status==='available').slice(0,count);
  if(!avail.length){ document.getElementById('emerg-alert').innerHTML='<div class="alert alert-error">No available beds in selected ward!</div>'; return; }
  for(const b of avail){
    await fetch(`/api/beds/${b.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'occupied'})});
  }
  document.getElementById('emerg-alert').innerHTML=`<div class="alert alert-success">🚨 ${avail.length} bed(s) reserved for ${etype} emergency!</div>`;
  setTimeout(()=>{ closeModal('emerg-modal'); document.getElementById('emerg-alert').innerHTML=''; loadData(); },2000);
}

loadData();
</script>
</body>
</html>
