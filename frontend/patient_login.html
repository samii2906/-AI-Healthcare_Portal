<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>HealthAI — Patient Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg,#ffe8f0 0%,#f0e8ff 50%,#e8fff0 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 2.5rem;
      width: 100%; max-width: 440px;
      box-shadow: 0 20px 60px rgba(232,105,138,.15);
      border: 2px solid #ffe0ec;
    }
    .logo-circle {
      width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 1rem;
      background: linear-gradient(135deg,#FFB3C6,#C9B8FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
    }
    .tab-row {
      display: flex; gap: 4px; background: #fff0f6;
      border-radius: 12px; padding: 4px; margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      background: transparent; font-size: .88rem; font-weight: 600;
      cursor: pointer; color: var(--muted); transition: all .2s;
    }
    .tab-btn.active {
      background: #fff; color: var(--text);
      box-shadow: 0 2px 8px rgba(232,105,138,.15);
    }
    .portal-links {
      margin-top: 1.2rem; display: flex; gap: 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .portal-link {
      padding: 8px 16px; border-radius: 10px; font-size: .8rem;
      font-weight: 600; text-decoration: none; transition: opacity .2s;
    }
    .portal-link:hover { opacity: .8; }
  </style>
</head>
<body>
<div style="width:100%;max-width:440px;padding:1rem">
  <div class="card">
    <div class="logo-circle">🧑‍⚕️</div>
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:1.4rem;font-weight:800;color:var(--text)">Patient Portal</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:4px">
        HealthAI — View your health records &amp; appointments
      </div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('login')">🔑 Login</button>
      <button class="tab-btn" onclick="setTab('register')">📝 Register</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div id="login-alert"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="l-user" placeholder="Your username"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Your password"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary"
              style="width:100%;padding:12px;font-size:1rem;
                     background:linear-gradient(135deg,#FFB3C6,#C9B8FF)"
              onclick="doLogin()">
        🔑 Login
      </button>
      <div style="margin-top:1rem;background:#fff0f6;border-radius:10px;
                  padding:12px;font-size:.8rem;color:var(--muted)">
        <b>Demo:</b> patient1 / pat123
      </div>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div id="reg-alert"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="r-name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="r-user" placeholder="Choose username">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="r-pass" placeholder="Choose password">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="r-age" placeholder="Age">
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="r-gender">
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Blood Group</label>
          <select id="r-blood">
            <option>A+</option><option>A-</option><option>B+</option>
            <option>B-</option><option>O+</option><option>O-</option>
            <option>AB+</option><option>AB-</option>
          </select>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="r-phone" placeholder="Mobile number">
        </div>
      </div>
      <button class="btn btn-success"
              style="width:100%;padding:12px;font-size:1rem"
              onclick="doRegister()">
        📝 Create Account
      </button>
    </div>

    <!-- Portal links -->
    <div class="portal-links">
      <a class="portal-link"
         style="background:#e8f4ff;color:#5B9BD5"
         href="/doctor-login">👨‍⚕️ Doctor Portal</a>
      <a class="portal-link"
         style="background:#f0ebff;color:#7C6FD4"
         href="/admin-login">🛡️ Admin Portal</a>
    </div>
  </div>
</div>

<script>
function setTab(t) {
  document.getElementById('tab-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = t==='register' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register'))
  );
}

async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!username || !password) {
    showAlert('login-alert','Please enter username and password.','error');
    return;
  }
  const res  = await fetch('/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    credentials:'include',
    body: JSON.stringify({username, password})
  });
  const data = await res.json();
  if (data.success) {
    if (data.role !== 'patient') {
      showAlert('login-alert',
        'This portal is for patients only. '
        + (data.role==='doctor'
           ? '<a href="/doctor-login">Go to Doctor Portal →</a>'
           : '<a href="/admin-login">Go to Admin Portal →</a>'),
        'error');
      return;
    }
    localStorage.setItem('hai_user', JSON.stringify(data));
    window.location.href = '/patient-dashboard';
  } else {
    showAlert('login-alert', data.message || 'Invalid credentials', 'error');
  }
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const user = document.getElementById('r-user').value.trim();
  const pass = document.getElementById('r-pass').value;
  if (!name||!user||!pass) {
    showAlert('reg-alert','Name, username and password are required.','error');
    return;
  }
  const res  = await fetch('/api/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      username:user, password:pass, role:'patient',
      name, email:document.getElementById('r-email').value,
      age:document.getElementById('r-age').value,
      gender:document.getElementById('r-gender').value,
      blood_group:document.getElementById('r-blood').value,
      phone:document.getElementById('r-phone').value,
    })
  });
  const data = await res.json();
  if (data.success) {
    showAlert('reg-alert','✅ Account created! Please login.','success');
    setTimeout(()=>setTab('login'),1500);
  } else {
    showAlert('reg-alert', data.message||'Registration failed','error');
  }
}

function showAlert(id, msg, type) {
  document.getElementById(id).innerHTML =
    `<div class="alert alert-${type}">${msg}</div>`;
}
</script>
</body>
</html>
