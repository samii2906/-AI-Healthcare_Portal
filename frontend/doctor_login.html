<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>HealthAI — Doctor Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      min-height:100vh;
      background: linear-gradient(135deg,#e8f4ff 0%,#f0e8ff 50%,#e8fff4 100%);
      display:flex; align-items:center; justify-content:center;
    }
    .login-wrap { width:100%; max-width:460px; padding:1rem; }
    .login-card {
      background:var(--white); border-radius:24px; padding:2.5rem;
      box-shadow:0 20px 60px rgba(91,155,213,.18);
      border:2px solid #e0f0ff;
    }
    .doc-badge {
      background:linear-gradient(135deg,#5B9BD5,#7C6FD4);
      color:#fff; border-radius:50%; width:72px; height:72px;
      display:flex; align-items:center; justify-content:center;
      font-size:2rem; margin:0 auto 1rem;
    }
    .tab-row {
      display:flex; gap:4px; background:#f0f4ff;
      border-radius:12px; padding:4px; margin-bottom:1.5rem;
    }
    .tab-btn {
      flex:1; padding:10px; border:none; border-radius:10px;
      background:transparent; font-size:.88rem; font-weight:600;
      cursor:pointer; color:var(--muted); transition:all .2s;
    }
    .tab-btn.active {
      background:var(--white); color:var(--text);
      box-shadow:0 2px 8px rgba(91,155,213,.15);
    }
    .role-btn {
      border:2px solid var(--border); border-radius:12px;
      padding:12px 16px; cursor:pointer; transition:all .2s;
      background:var(--white); text-align:center;
      font-size:.85rem; font-weight:600; color:var(--muted);
    }
    .role-btn.active {
      border-color:#5B9BD5; background:#f0f4ff; color:var(--text);
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <div class="doc-badge">👨‍⚕️</div>
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:1.4rem;font-weight:800;color:var(--text)">Doctor Portal</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:4px">
        HealthAI — Smart Healthcare System
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('login')">🔑 Login</button>
      <button class="tab-btn" onclick="setTab('register')">📝 Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="tab-login">
      <div id="login-alert"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="l-user" placeholder="Your doctor username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Your password"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:1rem;margin-top:.5rem"
              onclick="doLogin()">
        🔑 Login as Doctor
      </button>

      <div style="margin-top:1.2rem;background:#f0f4ff;border-radius:12px;padding:14px;font-size:.82rem;color:var(--muted)">
        <b>Demo doctor accounts:</b><br>
        👨‍⚕️ doctor1 / doc123 &nbsp;|&nbsp;
        👩‍⚕️ doctor2 / doc223 &nbsp;|&nbsp;
        👨‍⚕️ doctor3 / doc323
      </div>

      <div style="margin-top:1rem;text-align:center;font-size:.82rem;color:var(--muted)">
        Not a doctor?
        <a href="/" style="color:#7C6FD4;font-weight:600">Patient / Admin Login →</a>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="tab-register" style="display:none">
      <div id="reg-alert"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="r-name" placeholder="Dr. Full Name">
        </div>
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="r-user" placeholder="Login username">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="doctor@hospital.com">
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="r-pass" placeholder="Choose password">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <select id="r-dept">
            <option>Cardiology</option><option>Endocrinology</option>
            <option>Nephrology</option><option>Pediatrics</option>
            <option>Surgery</option><option>ICU</option>
            <option>General</option><option>Neurology</option>
            <option>Orthopedics</option><option>Dermatology</option>
          </select>
        </div>
        <div class="form-group">
          <label>Specialization</label>
          <input type="text" id="r-spec" placeholder="e.g. Heart Disease">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Qualification</label>
          <input type="text" id="r-qual" placeholder="e.g. MBBS, MD">
        </div>
        <div class="form-group">
          <label>Experience (years)</label>
          <input type="number" id="r-exp" placeholder="5" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="r-phone" placeholder="Mobile number">
        </div>
        <div class="form-group">
          <label>Available Slots</label>
          <input type="text" id="r-slots" value="9AM,11AM,2PM,4PM">
        </div>
      </div>
      <button class="btn btn-success" style="width:100%;padding:12px;font-size:1rem;margin-top:.5rem"
              onclick="doRegister()">
        📝 Register as Doctor
      </button>
      <div style="margin-top:1rem;text-align:center;font-size:.82rem;color:var(--muted)">
        Already registered?
        <a href="#" onclick="setTab('login')" style="color:#7C6FD4;font-weight:600">Login →</a>
      </div>
    </div>

  </div><!-- /card -->
</div><!-- /wrap -->

<script>
function setTab(t) {
  document.getElementById('tab-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = t==='register' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register'))
  );
}

async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!username || !password) {
    document.getElementById('login-alert').innerHTML =
      '<div class="alert alert-error">Please enter username and password.</div>';
    return;
  }
  const res  = await fetch('/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    credentials:'include',
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.success) {
    if (data.role !== 'doctor' && data.role !== 'admin') {
      document.getElementById('login-alert').innerHTML =
        '<div class="alert alert-error">❌ This portal is for doctors only. '
        + '<a href="/">Go to patient login →</a></div>';
      return;
    }
    localStorage.setItem('hai_user', JSON.stringify(data));
    window.location.href = '/doctor-dashboard';
  } else {
    document.getElementById('login-alert').innerHTML =
      `<div class="alert alert-error">❌ ${data.message}</div>`;
  }
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const user = document.getElementById('r-user').value.trim();
  const pass = document.getElementById('r-pass').value;
  if (!name || !user || !pass) {
    document.getElementById('reg-alert').innerHTML =
      '<div class="alert alert-error">Name, username and password are required.</div>';
    return;
  }

  // 1. Create user account
  const userRes = await fetch('/api/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      username: user, password: pass, role:'doctor',
      email: document.getElementById('r-email').value,
      name, phone: document.getElementById('r-phone').value,
    })
  });
  const userData = await userRes.json();
  if (!userData.success) {
    document.getElementById('reg-alert').innerHTML =
      `<div class="alert alert-error">❌ ${userData.message}</div>`;
    return;
  }

  // 2. Create doctor profile
  const docRes = await fetch('/api/doctors', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      username:       user,
      password:       pass,
      email:          document.getElementById('r-email').value,
      department:     document.getElementById('r-dept').value,
      specialization: document.getElementById('r-spec').value,
      qualification:  document.getElementById('r-qual').value,
      experience:     parseInt(document.getElementById('r-exp').value) || 0,
      phone:          document.getElementById('r-phone').value,
      available_slots:document.getElementById('r-slots').value,
      status:         'On Shift',
    })
  });

  document.getElementById('reg-alert').innerHTML =
    '<div class="alert alert-success">✅ Registration successful! You can now login.</div>';
  setTimeout(() => setTab('login'), 2000);
}
</script>
</body>
</html>
